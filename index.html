<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#2e7d32">
<title>Gastos Casa</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
  :root{
    --bg:#f7f7f5;
    --card:#ffffff;
    --text:#1f2933;
    --muted:#6b7280;
    --border:#e5e7eb;
    --green:#2e7d32;
    --green-light:#e8f5e9;
    --red:#c62828;
    --red-light:#fdecea;
    --accent:#2e7d32;
    --radius:14px;
    --shadow:0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    -webkit-tap-highlight-color:transparent;
    padding-bottom:78px;
  }
  header{
    padding:18px 16px 10px;
    position:sticky;
    top:0;
    background:var(--bg);
    z-index:5;
  }
  header h1{
    font-size:20px;
    margin:0;
    font-weight:700;
  }
  header .sub{
    color:var(--muted);
    font-size:13px;
    margin-top:2px;
  }
  main{
    padding:0 16px 16px;
    max-width:520px;
    margin:0 auto;
  }
  .card{
    background:var(--card);
    border-radius:var(--radius);
    padding:16px;
    box-shadow:var(--shadow);
    margin-bottom:14px;
  }
  .month-nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
  }
  .month-nav button{
    background:none;
    border:none;
    font-size:18px;
    color:var(--muted);
    padding:6px 10px;
    cursor:pointer;
  }
  .month-nav .label{
    font-weight:600;
    font-size:15px;
    text-transform:capitalize;
  }
  .currency-tabs{
    display:flex;
    gap:8px;
    margin-bottom:14px;
  }
  .currency-tabs button{
    flex:1;
    padding:8px 0;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--card);
    color:var(--muted);
    font-weight:600;
    font-size:14px;
    cursor:pointer;
  }
  .currency-tabs button.active{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
  }
  .balance-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:6px;
  }
  .balance-item{
    text-align:center;
    padding:10px 4px;
    border-radius:10px;
  }
  .balance-item.in{background:var(--green-light);}
  .balance-item.out{background:var(--red-light);}
  .balance-item .lbl{font-size:12px;color:var(--muted);}
  .balance-item .val{font-size:17px;font-weight:700;margin-top:2px;}
  .balance-item.in .val{color:var(--green);}
  .balance-item.out .val{color:var(--red);}
  .net-total{
    text-align:center;
    margin-top:12px;
    padding-top:12px;
    border-top:1px solid var(--border);
  }
  .net-total .lbl{font-size:13px;color:var(--muted);}
  .net-total .val{font-size:26px;font-weight:800;margin-top:2px;}
  .net-total .val.neg{color:var(--red);}
  .net-total .val.pos{color:var(--green);}

  .section-title{
    font-size:14px;
    font-weight:700;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:0.04em;
    margin:18px 0 10px 2px;
  }

  .cat-bar-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
  }
  .cat-bar-row .cat-name{
    width:84px;
    font-size:13px;
    flex-shrink:0;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .cat-bar-track{
    flex:1;
    height:8px;
    background:var(--border);
    border-radius:6px;
    overflow:hidden;
  }
  .cat-bar-fill{
    height:100%;
    background:var(--accent);
    border-radius:6px;
  }
  .cat-bar-row .cat-amt{
    width:78px;
    text-align:right;
    font-size:13px;
    font-weight:600;
    flex-shrink:0;
  }

  .empty-state{
    text-align:center;
    padding:30px 10px;
    color:var(--muted);
  }
  .empty-state .icon{font-size:34px;margin-bottom:8px;}
  .empty-state .txt{font-size:14px;}

  .move-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:12px 0;
    border-bottom:1px solid var(--border);
  }
  .move-item:last-child{border-bottom:none;}
  .move-left{display:flex;align-items:center;gap:12px;}
  .move-icon{
    width:38px;height:38px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:17px;flex-shrink:0;
  }
  .move-icon.in{background:var(--green-light);}
  .move-icon.out{background:var(--red-light);}
  .move-info .cat{font-size:14px;font-weight:600;}
  .move-info .desc{font-size:12px;color:var(--muted);margin-top:1px;}
  .move-right{text-align:right;}
  .move-right .amt{font-weight:700;font-size:14px;}
  .move-right .amt.in{color:var(--green);}
  .move-right .amt.out{color:var(--red);}
  .move-right .date{font-size:11px;color:var(--muted);margin-top:1px;}

  .filters{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding-bottom:4px;
    margin-bottom:12px;
  }
  .filters select{
    border:1px solid var(--border);
    background:var(--card);
    border-radius:10px;
    padding:8px 10px;
    font-size:13px;
    color:var(--text);
  }

  nav.bottom{
    position:fixed;
    bottom:0;left:0;right:0;
    background:var(--card);
    border-top:1px solid var(--border);
    display:flex;
    justify-content:space-around;
    padding:8px 0 calc(8px + env(safe-area-inset-bottom));
    z-index:10;
  }
  nav.bottom button{
    background:none;
    border:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:3px;
    color:var(--muted);
    font-size:11px;
    padding:4px 14px;
    cursor:pointer;
  }
  nav.bottom button.active{color:var(--accent);font-weight:700;}
  nav.bottom button .ic{font-size:20px;}
  nav.bottom button.fab{
    background:var(--accent);
    color:#fff;
    border-radius:50%;
    width:50px;height:50px;
    align-items:center;
    justify-content:center;
    margin-top:-22px;
    box-shadow:0 4px 10px rgba(46,125,50,0.4);
  }
  nav.bottom button.fab .ic{font-size:26px;}

  .modal-overlay{
    position:fixed;inset:0;
    background:rgba(0,0,0,0.45);
    display:flex;align-items:flex-end;
    z-index:50;
  }
  .modal-overlay.hidden{display:none;}
  .modal{
    background:var(--card);
    width:100%;
    border-radius:18px 18px 0 0;
    padding:18px 18px calc(18px + env(safe-area-inset-bottom));
    max-height:88vh;
    overflow-y:auto;
    animation:slideUp 0.2s ease-out;
  }
  @keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .modal h2{margin:0 0 14px;font-size:18px;}
  .type-toggle{
    display:flex;gap:8px;margin-bottom:14px;
  }
  .type-toggle button{
    flex:1;
    padding:10px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--bg);
    font-weight:600;
    cursor:pointer;
    color:var(--muted);
  }
  .type-toggle button.active.in{background:var(--green-light);color:var(--green);border-color:var(--green);}
  .type-toggle button.active.out{background:var(--red-light);color:var(--red);border-color:var(--red);}

  label.field{display:block;margin-bottom:12px;}
  label.field span{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;}
  .field input, .field select, .field textarea{
    width:100%;
    border:1px solid var(--border);
    border-radius:10px;
    padding:11px 12px;
    font-size:15px;
    background:var(--bg);
    color:var(--text);
    font-family:inherit;
  }
  .field input:focus, .field select:focus, .field textarea:focus{
    outline:2px solid var(--accent);
    outline-offset:-1px;
  }
  .currency-toggle{display:flex;gap:8px;}
  .currency-toggle button{
    flex:1;padding:9px;border-radius:10px;border:1px solid var(--border);
    background:var(--bg);font-weight:700;cursor:pointer;color:var(--muted);
  }
  .currency-toggle button.active{background:var(--accent);color:#fff;border-color:var(--accent);}

  .cat-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    margin-bottom:12px;
  }
  .cat-pill{
    border:1px solid var(--border);
    border-radius:10px;
    padding:9px 4px;
    text-align:center;
    font-size:12px;
    background:var(--bg);
    cursor:pointer;
  }
  .cat-pill.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .cat-pill.add-new{color:var(--accent);font-weight:700;}

  .btn-primary{
    width:100%;
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:12px;
    padding:14px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    margin-top:6px;
  }
  .btn-secondary{
    width:100%;
    background:none;
    color:var(--muted);
    border:none;
    padding:12px;
    font-size:14px;
    cursor:pointer;
  }
  .btn-danger{
    width:100%;
    background:var(--red-light);
    color:var(--red);
    border:none;
    border-radius:12px;
    padding:13px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    margin-top:8px;
  }
  .swipe-wrap{position:relative;overflow:hidden;}
  .toast{
    position:fixed;
    bottom:90px;left:50%;
    transform:translateX(-50%);
    background:#1f2933;
    color:#fff;
    padding:10px 18px;
    border-radius:10px;
    font-size:13px;
    z-index:100;
    opacity:0;
    transition:opacity 0.25s;
    pointer-events:none;
  }
  .toast.show{opacity:1;}
</style>
</head>
<body>

<header>
  <h1>Gastos Casa</h1>
  <div class="sub" id="headerSub">Control de ingresos y gastos</div>
</header>

<main>

  <!-- VISTA RESUMEN -->
  <section id="viewResumen">
    <div class="card">
      <div class="month-nav">
        <button id="prevMonth">‹</button>
        <div class="label" id="monthLabel">Junio 2026</div>
        <button id="nextMonth">›</button>
      </div>
      <div class="currency-tabs">
        <button id="tabCUP" class="active">CUP</button>
        <button id="tabUSD">USD</button>
      </div>
      <div class="balance-grid">
        <div class="balance-item in">
          <div class="lbl">Ingresos</div>
          <div class="val" id="sumIn">0</div>
        </div>
        <div class="balance-item out">
          <div class="lbl">Gastos</div>
          <div class="val" id="sumOut">0</div>
        </div>
      </div>
      <div class="net-total">
        <div class="lbl">Balance del mes</div>
        <div class="val" id="sumNet">0</div>
      </div>
    </div>

    <div class="section-title">Gastos por categoría</div>
    <div class="card" id="catBreakdown">
      <div class="empty-state">
        <div class="icon">📊</div>
        <div class="txt">Aún no hay gastos este mes</div>
      </div>
    </div>
  </section>

  <!-- VISTA MOVIMIENTOS -->
  <section id="viewMovimientos" style="display:none;">
    <div class="filters">
      <select id="filterMonth"></select>
      <select id="filterCurrency">
        <option value="all">Todas las monedas</option>
        <option value="CUP">CUP</option>
        <option value="USD">USD</option>
      </select>
      <select id="filterCategory">
        <option value="all">Todas las categorías</option>
      </select>
    </div>
    <div class="card" id="movList">
      <div class="empty-state">
        <div class="icon">📭</div>
        <div class="txt">No hay movimientos registrados todavía</div>
      </div>
    </div>
  </section>

</main>

<nav class="bottom">
  <button id="navResumen" class="active"><span class="ic">🏠</span>Resumen</button>
  <button id="navAdd" class="fab"><span class="ic">+</span></button>
  <button id="navMovs"><span class="ic">📋</span>Movimientos</button>
</nav>

<!-- MODAL AGREGAR/EDITAR MOVIMIENTO -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Nuevo movimiento</h2>

    <div class="type-toggle">
      <button id="typeIn" class="in">Ingreso</button>
      <button id="typeOut" class="out active">Gasto</button>
    </div>

    <label class="field">
      <span>Monto</span>
      <input type="number" id="inputAmount" inputmode="decimal" placeholder="0.00" step="0.01" min="0">
    </label>

    <label class="field">
      <span>Moneda</span>
      <div class="currency-toggle">
        <button id="curCUP" class="active">CUP</button>
        <button id="curUSD">USD</button>
      </div>
    </label>

    <label class="field">
      <span>Categoría</span>
      <div class="cat-grid" id="catGrid"></div>
    </label>

    <label class="field">
      <span>Descripción (opcional)</span>
      <input type="text" id="inputDesc" placeholder="Ej: Compra en mercado">
    </label>

    <label class="field">
      <span>Fecha</span>
      <input type="date" id="inputDate">
    </label>

    <button class="btn-primary" id="saveMove">Guardar</button>
    <button class="btn-danger hidden" id="deleteMove" style="display:none;">Eliminar movimiento</button>
    <button class="btn-secondary" id="cancelMove">Cancelar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  const STORAGE_KEY = "gastos_casa_data_v1";
  const CATS_KEY = "gastos_casa_cats_v1";

  const DEFAULT_CATEGORIES = [
    {id:"comida", name:"Comida", icon:"🍽️"},
    {id:"transporte", name:"Transporte", icon:"🚌"},
    {id:"salud", name:"Salud", icon:"💊"},
    {id:"hogar", name:"Hogar", icon:"🏠"},
    {id:"servicios", name:"Servicios", icon:"💡"},
    {id:"ocio", name:"Ocio", icon:"🎉"},
    {id:"otros", name:"Otros", icon:"📦"}
  ];

  let movimientos = loadData();
  let categorias = loadCats();

  function loadData(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    }catch(e){ return []; }
  }
  function saveData(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(movimientos));
  }
  function loadCats(){
    try{
      const raw = localStorage.getItem(CATS_KEY);
      return raw ? JSON.parse(raw) : DEFAULT_CATEGORIES.slice();
    }catch(e){ return DEFAULT_CATEGORIES.slice(); }
  }
  function saveCats(){
    localStorage.setItem(CATS_KEY, JSON.stringify(categorias));
  }

  function uid(){
    return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
  }

  function fmt(n){
    return Number(n).toLocaleString("es-ES", {minimumFractionDigits:0, maximumFractionDigits:2});
  }

  function toast(msg){
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"), 1800);
  }

  // ---------- ESTADO DE NAVEGACIÓN ----------
  let currentMonth = new Date(); // mes mostrado en Resumen
  let currentCurrency = "CUP";
  let editingId = null;
  let modalType = "out";
  let modalCurrency = "CUP";
  let modalCategory = categorias[0].id;

  const MONTH_NAMES = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];

  function monthKey(d){
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0");
  }

  // ---------- RENDER RESUMEN ----------
  function renderResumen(){
    document.getElementById("monthLabel").textContent =
      MONTH_NAMES[currentMonth.getMonth()] + " " + currentMonth.getFullYear();

    const key = monthKey(currentMonth);
    const filtered = movimientos.filter(m => m.date.slice(0,7) === key && m.currency === currentCurrency);

    let totalIn = 0, totalOut = 0;
    const catTotals = {};
    filtered.forEach(m=>{
      if(m.type === "in") totalIn += m.amount;
      else {
        totalOut += m.amount;
        catTotals[m.category] = (catTotals[m.category]||0) + m.amount;
      }
    });

    document.getElementById("sumIn").textContent = fmt(totalIn);
    document.getElementById("sumOut").textContent = fmt(totalOut);
    const net = totalIn - totalOut;
    const netEl = document.getElementById("sumNet");
    netEl.textContent = (net<0?"-":"") + fmt(Math.abs(net)) + " " + currentCurrency;
    netEl.className = "val " + (net<0?"neg":"pos");

    const breakdown = document.getElementById("catBreakdown");
    const catEntries = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
    if(catEntries.length === 0){
      breakdown.innerHTML = '<div class="empty-state"><div class="icon">📊</div><div class="txt">Aún no hay gastos este mes</div></div>';
    } else {
      const max = catEntries[0][1];
      breakdown.innerHTML = catEntries.map(([catId, amt])=>{
        const cat = categorias.find(c=>c.id===catId) || {name:catId, icon:"📦"};
        const pct = Math.round((amt/max)*100);
        return `<div class="cat-bar-row">
          <div class="cat-name">${cat.icon} ${cat.name}</div>
          <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${pct}%"></div></div>
          <div class="cat-amt">${fmt(amt)}</div>
        </div>`;
      }).join("");
    }
  }

  document.getElementById("prevMonth").addEventListener("click", ()=>{
    currentMonth.setMonth(currentMonth.getMonth()-1);
    renderResumen();
  });
  document.getElementById("nextMonth").addEventListener("click", ()=>{
    currentMonth.setMonth(currentMonth.getMonth()+1);
    renderResumen();
  });
  document.getElementById("tabCUP").addEventListener("click", ()=>{
    currentCurrency = "CUP";
    document.getElementById("tabCUP").classList.add("active");
    document.getElementById("tabUSD").classList.remove("active");
    renderResumen();
  });
  document.getElementById("tabUSD").addEventListener("click", ()=>{
    currentCurrency = "USD";
    document.getElementById("tabUSD").classList.add("active");
    document.getElementById("tabCUP").classList.remove("active");
    renderResumen();
  });

  // ---------- RENDER MOVIMIENTOS ----------
  function populateFilters(){
    const monthSel = document.getElementById("filterMonth");
    const months = Array.from(new Set(movimientos.map(m=>m.date.slice(0,7)))).sort().reverse();
    monthSel.innerHTML = '<option value="all">Todos los meses</option>' +
      months.map(k=>{
        const [y,mo] = k.split("-");
        return `<option value="${k}">${MONTH_NAMES[parseInt(mo)-1]} ${y}</option>`;
      }).join("");

    const catSel = document.getElementById("filterCategory");
    catSel.innerHTML = '<option value="all">Todas las categorías</option>' +
      categorias.map(c=>`<option value="${c.id}">${c.icon} ${c.name}</option>`).join("");
  }

  function renderMovimientos(){
    populateFilters();
    const fMonth = document.getElementById("filterMonth").value;
    const fCur = document.getElementById("filterCurrency").value;
    const fCat = document.getElementById("filterCategory").value;

    let list = movimientos.slice().sort((a,b)=> b.date.localeCompare(a.date) || b.createdAt - a.createdAt);
    if(fMonth !== "all") list = list.filter(m=>m.date.slice(0,7)===fMonth);
    if(fCur !== "all") list = list.filter(m=>m.currency===fCur);
    if(fCat !== "all") list = list.filter(m=>m.category===fCat);

    const container = document.getElementById("movList");
    if(list.length === 0){
      container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div class="txt">No hay movimientos para este filtro</div></div>';
      return;
    }

    container.innerHTML = list.map(m=>{
      const cat = categorias.find(c=>c.id===m.category) || {name:m.category, icon:"📦"};
      const sign = m.type === "in" ? "+" : "-";
      const d = new Date(m.date+"T00:00:00");
      const dateStr = d.toLocaleDateString("es-ES", {day:"2-digit", month:"short"});
      return `<div class="move-item" data-id="${m.id}">
        <div class="move-left">
          <div class="move-icon ${m.type}">${cat.icon}</div>
          <div class="move-info">
            <div class="cat">${cat.name}</div>
            <div class="desc">${m.desc ? m.desc : "&nbsp;"}</div>
          </div>
        </div>
        <div class="move-right">
          <div class="amt ${m.type}">${sign}${fmt(m.amount)} ${m.currency}</div>
          <div class="date">${dateStr}</div>
        </div>
      </div>`;
    }).join("");

    container.querySelectorAll(".move-item").forEach(el=>{
      el.addEventListener("click", ()=> openModal(el.dataset.id));
    });
  }

  document.getElementById("filterMonth").addEventListener("change", renderMovimientos);
  document.getElementById("filterCurrency").addEventListener("change", renderMovimientos);
  document.getElementById("filterCategory").addEventListener("change", renderMovimientos);

  // ---------- NAVEGACIÓN INFERIOR ----------
  function showView(view){
    document.getElementById("viewResumen").style.display = view==="resumen" ? "" : "none";
    document.getElementById("viewMovimientos").style.display = view==="movs" ? "" : "none";
    document.getElementById("navResumen").classList.toggle("active", view==="resumen");
    document.getElementById("navMovs").classList.toggle("active", view==="movs");
    if(view==="resumen") renderResumen();
    if(view==="movs") renderMovimientos();
  }
  document.getElementById("navResumen").addEventListener("click", ()=>showView("resumen"));
  document.getElementById("navMovs").addEventListener("click", ()=>showView("movs"));
  document.getElementById("navAdd").addEventListener("click", ()=>openModal(null));

  // ---------- MODAL ----------
  function renderCatGrid(){
    const grid = document.getElementById("catGrid");
    grid.innerHTML = categorias.map(c=>
      `<div class="cat-pill ${c.id===modalCategory?'active':''}" data-id="${c.id}">${c.icon}<br>${c.name}</div>`
    ).join("") + '<div class="cat-pill add-new" id="addCatBtn">+ Nueva</div>';

    grid.querySelectorAll(".cat-pill[data-id]").forEach(el=>{
      el.addEventListener("click", ()=>{
        modalCategory = el.dataset.id;
        renderCatGrid();
      });
    });
    document.getElementById("addCatBtn").addEventListener("click", addNewCategory);
  }

  function addNewCategory(){
    const name = prompt("Nombre de la nueva categoría:");
    if(!name || !name.trim()) return;
    const icon = prompt("Emoji para la categoría (opcional):", "📌") || "📌";
    const id = name.trim().toLowerCase().replace(/\s+/g,"_") + "_" + uid().slice(0,4);
    categorias.push({id, name:name.trim(), icon});
    saveCats();
    modalCategory = id;
    renderCatGrid();
  }

  function setModalType(type){
    modalType = type;
    document.getElementById("typeIn").classList.toggle("active", type==="in");
    document.getElementById("typeOut").classList.toggle("active", type==="out");
  }
  function setModalCurrency(cur){
    modalCurrency = cur;
    document.getElementById("curCUP").classList.toggle("active", cur==="CUP");
    document.getElementById("curUSD").classList.toggle("active", cur==="USD");
  }
  document.getElementById("typeIn").addEventListener("click", ()=>setModalType("in"));
  document.getElementById("typeOut").addEventListener("click", ()=>setModalType("out"));
  document.getElementById("curCUP").addEventListener("click", ()=>setModalCurrency("CUP"));
  document.getElementById("curUSD").addEventListener("click", ()=>setModalCurrency("USD"));

  function openModal(id){
    editingId = id;
    const overlay = document.getElementById("modalOverlay");
    const deleteBtn = document.getElementById("deleteMove");

    if(id){
      const m = movimientos.find(x=>x.id===id);
      if(!m){ return; }
      document.getElementById("modalTitle").textContent = "Editar movimiento";
      setModalType(m.type);
      setModalCurrency(m.currency);
      modalCategory = m.category;
      document.getElementById("inputAmount").value = m.amount;
      document.getElementById("inputDesc").value = m.desc || "";
      document.getElementById("inputDate").value = m.date;
      deleteBtn.style.display = "block";
    } else {
      document.getElementById("modalTitle").textContent = "Nuevo movimiento";
      setModalType("out");
      setModalCurrency("CUP");
      modalCategory = categorias[0].id;
      document.getElementById("inputAmount").value = "";
      document.getElementById("inputDesc").value = "";
      document.getElementById("inputDate").value = new Date().toISOString().slice(0,10);
      deleteBtn.style.display = "none";
    }
    renderCatGrid();
    overlay.classList.remove("hidden");
  }

  function closeModal(){
    document.getElementById("modalOverlay").classList.add("hidden");
    editingId = null;
  }

  document.getElementById("cancelMove").addEventListener("click", closeModal);
  document.getElementById("modalOverlay").addEventListener("click", (e)=>{
    if(e.target.id === "modalOverlay") closeModal();
  });

  document.getElementById("saveMove").addEventListener("click", ()=>{
    const amount = parseFloat(document.getElementById("inputAmount").value);
    const date = document.getElementById("inputDate").value;
    const desc = document.getElementById("inputDesc").value.trim();

    if(!amount || amount <= 0){
      toast("Ingresa un monto válido");
      return;
    }
    if(!date){
      toast("Selecciona una fecha");
      return;
    }

    if(editingId){
      const m = movimientos.find(x=>x.id===editingId);
      m.type = modalType;
      m.currency = modalCurrency;
      m.category = modalCategory;
      m.amount = amount;
      m.desc = desc;
      m.date = date;
      toast("Movimiento actualizado");
    } else {
      movimientos.push({
        id: uid(),
        type: modalType,
        currency: modalCurrency,
        category: modalCategory,
        amount: amount,
        desc: desc,
        date: date,
        createdAt: Date.now()
      });
      toast("Movimiento guardado");
    }
    saveData();
    closeModal();
    renderResumen();
    renderMovimientos();
  });

  document.getElementById("deleteMove").addEventListener("click", ()=>{
    if(!editingId) return;
    if(!confirm("¿Eliminar este movimiento? Esta acción no se puede deshacer.")) return;
    movimientos = movimientos.filter(m=>m.id!==editingId);
    saveData();
    toast("Movimiento eliminado");
    closeModal();
    renderResumen();
    renderMovimientos();
  });

  // ---------- INIT ----------
  showView("resumen");

  // ---------- SERVICE WORKER ----------
  if("serviceWorker" in navigator){
    window.addEventListener("load", ()=>{
      navigator.serviceWorker.register("./sw.js").catch(()=>{});
    });
  }

})();
</script>
</body>
</html>
